version: '3'

vars:
  BINARY: 'uptime'
  DISTPATH: '.'

tasks:
  build:
    cmds:
      - |
        extism-py src/uptime.py -o {{.BINARY}}.wasm

  optimize:
    cmds:
      - wasm-opt -Os {{.DISTPATH}}/{{.BINARY}}.wasm --output ./{{.BINARY}}.wasm

  strip:
    cmds:
      - wasm-strip ./{{.BINARY}}.wasm

  run:
    cmds:
      - extism call --wasi \ --log-level=debug \ ./{{.BINARY}}.wasm run

  install:
      cmds:
        - curl -Ls https://raw.githubusercontent.com/extism/python-pdk/main/install.sh | bash

  default:
    cmds:
      - task: build
      - task: optimize
      - task: strip
