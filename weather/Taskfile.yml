version: '3'

vars:
  BINARY: 'weather'
  DISTPATH: '.'

tasks:
  build:
    cmds:
      - clang -o {{.BINARY}}.wasm --target=wasm32-unknown-unknown -Wl,--no-entry src/weather.c

  optimize:
    cmds:
      - wasm-opt -Os {{.DISTPATH}}/{{.BINARY}}.wasm --output ./{{.BINARY}}.wasm

  strip:
    cmds:
      - wasm-strip ./{{.BINARY}}.wasm

  run:
    cmds:
      - |
        extism call ./{{.BINARY}}.wasm run --allow-host api.open-meteo.com \
          --config latitude=51.4566 \
          --config longitude=7.0123

  sizes:
    cmds:
      - du -shc **/*.wasm

  default:
    cmds:
      - task: build
      - task: optimize
      - task: strip
