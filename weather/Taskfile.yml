version: '3'

vars:
  BINARY: 'weather'
  DISTPATH: '.'

env:
  WASI_SDK_PATH: '/opt/wasi-sdk'

tasks:
  build:
    cmds:
      - |
        {{.WASI_SDK_PATH}}/bin/clang -O2 -o {{.BINARY}}.wasm \
          --sysroot={{.WASI_SDK_PATH}}/share/wasi-sysroot \
          --target=wasm32-unknown-unknown \
          -mexec-model=reactor \
          src/weather.c

  optimize:
    cmds:
      - wasm-opt -Os {{.DISTPATH}}/{{.BINARY}}.wasm --output ./{{.BINARY}}.wasm

  strip:
    cmds:
      - wasm-strip ./{{.BINARY}}.wasm

  run:
    cmds:
      - |
        extism call --wasi \
          --allow-host api.open-meteo.com \
          --config latitude=51.4566 \
          --config longitude=7.0123 \
          ./{{.BINARY}}.wasm run

  sizes:
    cmds:
      - du -shc **/*.wasm

  install:
      cmds:
        - curl -LO https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-30/wasi-sdk-30.0-x86_64-linux.deb
        - sudo dpkg -i ./wasi-sdk-30.0-x86_64-linux.deb

  default:
    cmds:
      - task: build
      - task: optimize
      - task: strip
